version: '3.8'

services:
  app:
    build: .
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - bazaar
    depends_on:
      db:
        condition: service_healthy

  web:
    image: nginx:latest
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - bazaar
    depends_on:
      - app

  # 🟢 NEW: Node/Vite service (IMPORTANT FIX)
  node:
    image: node:20
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - "5173:5173"
    command: sh -c "npm run dev -- --host 0.0.0.0"
    networks:
      - bazaar

  db:
    build: ./mysql
    networks:
      - bazaar
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    environment:
      MYSQL_DATABASE: bazaar
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8081:80"
    networks:
      - bazaar
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db

  maildev:
    image: maildev/maildev
    ports:
      - "1025:1025"
      - "1080:1080"
    networks:
      - bazaar

volumes:
  dbdata:

networks:
  bazaar: