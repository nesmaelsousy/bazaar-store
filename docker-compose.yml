
services:
  app:
    build: .
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - bazaar
    depends_on:
      - db

  web:
    image: nginx:latest
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - bazaar
    depends_on:
      - app

  node:
    image: node:20
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - "5173:5173"
    command: sh -c "npm run dev -- --host 0.0.0.0"
    networks:
      - bazaar

  db:
    image: postgres:15
    container_name: bazaar_postgres
    restart: always
    environment:
      POSTGRES_DB: bazaar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - bazaar
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  maildev:
    image: maildev/maildev
    ports:
      - "1025:1025"
      - "1080:1080"
    networks:
      - bazaar

volumes:
  pgdata:

networks:
  bazaar: